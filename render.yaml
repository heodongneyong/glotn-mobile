services:
  - type: web
    name: glotn-mobile
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: glotn-mobile-db
          property: connectionString
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: glotn-mobile-db
    plan: starter
    databaseName: glotn_mobile
    user: glotn_mobile
